name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

# Workflow-level permissions stay read-only: this pipeline builds and tests the
# mobile app, but it does not publish artifacts to external registries or write
# back to repositories.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew
      - name: Run shared JVM tests
        run: ./gradlew --no-daemon :composeApp:jvmTest
      - name: Run Android lint
        run: ./gradlew --no-daemon :androidApp:lint
      - name: Build Android debug artifact
        run: ./gradlew --no-daemon :androidApp:assembleDebug

  validate-apple:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: App
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew
      - name: Build iOS simulator framework
        run: ./gradlew --no-daemon :composeApp:linkDebugFrameworkIosSimulatorArm64