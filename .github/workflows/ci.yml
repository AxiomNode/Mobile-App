name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

# Workflow-level permissions stay read-only: this pipeline builds and tests the
# mobile app, but it does not publish artifacts to external registries or write
# back to repositories.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew
      - name: Prepare Firebase placeholder for CI
        run: |
          cat > androidApp/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "axiomnode-ci",
              "storage_bucket": "axiomnode-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:devci",
                  "android_client_info": {
                    "package_name": "es.sebas1705.axiomnode.dev"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "ci-placeholder" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:stgci",
                  "android_client_info": {
                    "package_name": "es.sebas1705.axiomnode.stg"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "ci-placeholder" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:prodci",
                  "android_client_info": {
                    "package_name": "es.sebas1705.axiomnode"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "ci-placeholder" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON
      - name: Run shared JVM tests
        run: ./gradlew --no-daemon :composeApp:jvmTest
      - name: Run Android lint
        run: ./gradlew --no-daemon :androidApp:lint
      - name: Build Android debug artifact
        run: ./gradlew --no-daemon :androidApp:assembleDebug

  validate-apple:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: App
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew
      - name: Build iOS simulator framework
        run: ./gradlew --no-daemon :composeApp:linkDebugFrameworkIosSimulatorArm64